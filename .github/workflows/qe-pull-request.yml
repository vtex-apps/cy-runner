name: '[PRN] Quality Engineering'

on:
  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  quality-engineering:
    name: QE
    uses: vtex-apps/usqa/.github/workflows/quality-engineering.yml@v1.0.0
    with:
      danger: true
      dangerRequireChangelog: false
      nodeLint: true
      nodeTest: false
      nodeSonar: true
      nodeSonarProjectKey: ${GITHUB_REPOSITORY%/*}_${GITHUB_REPOSITORY#*/}
      nodeSonarOrganization: ${GITHUB_REPOSITORY%/*}
      cypress: false
    secrets:
      githubToken: ${{ secrets.GITHUB_TOKEN }}
      sonarToken: ${{ secrets.SONAR_TOKEN }}
      cypressJson: ${{ secrets.VTEX_QE }}
