name: '[PSH] Quality Engineering'

on:
  push:
    branches:
      - master
      - main
      - feature/action-workspace

jobs:
  quality-engineering:
    name: QE
    uses: vtex-apps/usqa/.github/workflows/quality-engineering.yml@v1.0.0
    with:
      nodeLint: true
      nodeTest: false
      nodeSonar: true
      nodeSonarProjectKey: ${GITHUB_REPOSITORY%/*}_${GITHUB_REPOSITORY#*/}
      nodeSonarOrganization: ${GITHUB_REPOSITORY%/*}
    secrets:
      githubToken: ${{ secrets.GITHUB_TOKEN }}
      sonarToken: ${{ secrets.SONAR_TOKEN }}
